<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PlaceMe — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-wrap {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .auth-error {
      color: #dc2626;
      font-size: 13.5px;
      margin-bottom: 20px;
      display: none;
      background: #fee2e2;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #fca5a5;
      font-weight: 500;
    }

    .lc-logo {
      font-size: 32px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .lc-sub {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 30px;
    }
  </style>
</head>

<body class="login-body">
  <div class="login-wrap">
    <form class="login-box" id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
      <div class="lc-logo">PlaceMe Portal</div>
      <div class="lc-sub">Sign in to your account</div>

      <div class="auth-error" id="authErr"></div>

      <div class="fg" style="text-align:left">
        <label>Email Address</label>
        <input id="email" type="email" placeholder="admin@college.edu" required>
      </div>

      <div class="fg" style="text-align:left">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-p"
        style="width:100%; margin-top:10px; justify-content:center; padding: 12px; font-size:15px;">Sign In <i
          class="fas fa-arrow-right" style="margin-left: 8px;"></i></button>

      <div style="margin-top:20px; font-size:12px; color:var(--t3);">
        Demo Admin: admin@college.edu / admin<br />
        Demo Student: arjun@college.edu / student123
      </div>
    </form>
  </div>

  <script src="/js/login.js"></script>
</body>

</html>
